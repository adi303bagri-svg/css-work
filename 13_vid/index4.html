<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css position property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;

        }

        .box1 {
            background-color: antiquewhite;
            position: absolute;
            top: 0px;
            left: 0px;
            /* z-index:1; */

        }

        .box2 {
            background-color: brown;
            /* position: relative; */
            top: 0px;
            left: 0px;
        }

        .box3 {
            background-color: blue;
        }

        .box4 {
            background-color: aquamarine;
        }

        .parent {
            /* position: relative; */
          /* Exeptions  transform: translate(0); */
            /* filter: invert(0); */
            /* perspective:0em; */

            margin: 40px;
            padding: 40px;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">I am box 1</div>
        <div class="box box2">I am box 2</div>
        <div class="box box3">I am box 3</div>
        <div class="box box4">I am box 4</div>
    </div>
</body>

</html>
