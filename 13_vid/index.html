<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css position property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            height: 133px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;

        }

        .box1 {
            background-color: antiquewhite;
            position: absolute;
            top: 48px;
            left: 0px;
            /* z-index:1; */

        }

        .box2 {
            background-color: brown;
            position: relative;
            top: 48px;
            left: 0px;
        }

        .box3 {
            background-color: blue;
        }

        .box4 {
            background-color: aquamarine;
            /* position: absolute; */
            /* left: 0px; */
        }

        .parent {
                    /* if element is positioned absolute then to make it positioned according to its parent "cntainer" we add any  positioned css property exept static or default in parent "container" css  */

            position: absolute;
            margin: 40px;
            padding: 40px;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">I am box 1</div>
        <div class="box box2">I am box 2</div>
        <div class="box box3">I am box 3</div>
        <div class="box box4">I am box 4</div>
    </div>
</body>

</html>
