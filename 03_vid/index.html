<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css boxmodel</title>
    <style>
        * {
           margin: 0;
           padding: 0;
           
        }
        .box {
            background-color: aqua;
        }
        .box1 {
            color: rgb(83, 30, 30);
            padding: 5px;
            margin: 5px;
            border: 5px solid blue;
            height: 100px; 
            box-sizing: border-box;
        }
        .box2 {
            color: blue;
            padding: 5px;
            margin: 5px;
            border: 5px solid blue;
            height: 100px; 
            box-sizing: border-box;
        }
        /* <if 1 margin is 25 and other is 35 then it collapse to 35> */

    </style>
</head>

<body>
    <div class="box box1">
        i am a box
    </div>
    <div class="box box2">
        i am an another box
    </div>
</body>

</html>
