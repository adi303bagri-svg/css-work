<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css shadow and otlines</title>
    <style>
        .box{
            border:2px solid burlywood;
            margin:20px;
            padding:20px;
            box-shadow:5px 5px 15px 5px #530b06;
        }
        .box1{
            font-size:20px;
            text-shadow: 2px 2px 4px #01b853;
            border:2px solid black;
            outline:2px solid blue;
            outline-offset:2px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="box">
        
    </div>
    <p class="box1">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Perspiciatis, non.
    </p>
</body>
</html>
