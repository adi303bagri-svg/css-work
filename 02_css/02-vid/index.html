<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecters</title>
    <style>
        /* <Element selector> It means you can color or costamize css for all the choosen tag*/
        div {
            color: rgb(175, 46, 147);
        }

        /* class selector>  use for class attribute i.e class"__" then put .__ instyle*/
        .red {
            background-color: aqua;
        }

        /* id selector> same way as class selector work */
        #green {
            color: black;
            background-color: green;
        }

        /* Child Selector>  */
        div>p {
            color: rgb(7, 3, 10);
            background-color: rgb(43, 255, 0);
        }

        /* descendant selector */
        div p {
            color: black;
            background-color: rgb(145, 63, 145);
        }

        /* Universal selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* pseudo selector */
        a:visited {
            color: rgba(218, 0, 0, 0.849);
        }
        a:link {
            color: green;
        }
        a:active {
            background-color: brown;
        }
        a:hover {
            color: rgb(77, 51, 168);
        }
        p:first-child{
            color: aquamarine;
        }
    </style>
</head>

<body>
    <div id="green">
        how are you
    </div>

    <div class="red">
        hello
    </div>
    <div>
        <p>you can'nt tought me</p>
    </div>

    <article>
        <p>my brother</p>
        <p>my sister</p>
    </article>

    <div>
        <section>
            <p>
                how are you bro i miss you allot
            </p>
        </section>
    </div>

    <a href="https:/www.google.com">Go to google</a>
    <a href="https:/www.facebook.com">Go to facebook</a>



</body>

</html>
